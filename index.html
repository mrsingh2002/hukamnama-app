<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Hukamnama — Sri Harmandir Sahib</title>
  <style>
    :root {
      --gold: #c9a84c;
      --gold-light: #e8c96a;
      --gold-dark: #9a7a30;
      --bg: #0d0d0d;
      --bg-card: #161616;
      --bg-elevated: #1e1e1e;
      --text: #e8e0d0;
      --text-muted: #8a8070;
      --border: #2a2820;
      --gurmukhi: 'Noto Sans Gurmukhi', 'Gurbani Akhar', serif;
      --cyber: #e07020;
      --cyber-light: #f0943a;
      --cyber-dark: #a04e10;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Georgia', 'Times New Roman', serif;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(180deg, #1a1500 0%, var(--bg) 100%);
      border-bottom: 1px solid var(--gold-dark);
      padding: 32px 24px 24px;
      text-align: center;
    }

    .header-symbol {
      font-size: 2.4rem;
      color: var(--gold);
      letter-spacing: 4px;
      margin-bottom: 12px;
      font-family: var(--gurmukhi);
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: normal;
      color: var(--gold-light);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    header p.subtitle {
      font-size: 0.85rem;
      color: var(--text-muted);
      letter-spacing: 1px;
    }

    .date-badge {
      display: inline-block;
      margin-top: 16px;
      padding: 6px 18px;
      border: 1px solid var(--gold-dark);
      border-radius: 2px;
      color: var(--gold);
      font-size: 0.85rem;
      letter-spacing: 1px;
    }

    main {
      max-width: 820px;
      margin: 0 auto;
      padding: 32px 20px 80px;
    }

    #loading, #error {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
    }

    #error {
      color: #c07070;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Info bar */
    .hukamnama-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 32px;
      padding: 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-top: 2px solid var(--gold-dark);
    }

    .meta-item {
      flex: 1 1 auto;
      min-width: 160px;
    }

    .meta-label {
      font-size: 0.65rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .meta-value {
      font-size: 0.95rem;
      color: var(--gold-light);
    }

    .meta-value.gurmukhi {
      font-family: var(--gurmukhi);
      font-size: 1.1rem;
    }

    /* Divider */
    .section-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 28px 0;
      color: var(--gold-dark);
      font-size: 0.75rem;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .section-divider::before,
    .section-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Verse cards */
    .verse-card {
      margin-bottom: 28px;
      border: 1px solid var(--border);
      background: var(--bg-card);
    }

    .verse-card.is-header {
      border-color: var(--gold-dark);
      background: #14120a;
    }

    .verse-gurmukhi {
      padding: 20px 20px 14px;
      font-family: var(--gurmukhi);
      font-size: 1.5rem;
      line-height: 1.7;
      color: #f0e8d0;
      border-bottom: 1px solid var(--border);
    }

    .verse-card.is-header .verse-gurmukhi {
      color: var(--gold-light);
      font-size: 1.6rem;
    }

    .verse-transliteration {
      padding: 10px 20px;
      font-size: 0.85rem;
      font-style: italic;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      line-height: 1.6;
    }

    .verse-translations {
      padding: 14px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .translation-block {
      padding-left: 12px;
      border-left: 2px solid var(--border);
    }

    .translation-block.punjabi {
      border-left-color: var(--gold-dark);
    }

    .translation-block.english {
      border-left-color: #3a5a3a;
    }

    .translation-lang {
      font-size: 0.65rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .translation-text {
      font-size: 0.95rem;
      line-height: 1.65;
      color: var(--text);
    }

    .translation-text.gurmukhi {
      font-family: var(--gurmukhi);
      font-size: 1.05rem;
    }

    /* Rehao marker */
    .rehao-marker {
      display: inline-block;
      margin-left: 6px;
      font-size: 0.7rem;
      color: var(--gold);
      letter-spacing: 1px;
      vertical-align: middle;
      font-family: sans-serif;
      font-style: normal;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 24px;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.78rem;
      letter-spacing: 0.5px;
    }

    footer a {
      color: var(--gold-dark);
      text-decoration: none;
    }

    footer a:hover {
      color: var(--gold);
    }

    /* Cyber Hukamnama */
    .cyber-section {
      margin-top: 56px;
      padding-top: 40px;
      border-top: 1px solid var(--border);
    }

    .cyber-heading {
      text-align: center;
      margin-bottom: 24px;
    }

    .cyber-heading h2 {
      font-size: 1.1rem;
      font-weight: normal;
      color: var(--cyber-light);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .cyber-heading p {
      font-size: 0.82rem;
      color: var(--text-muted);
    }

    .cyber-btn {
      display: block;
      margin: 0 auto 32px;
      padding: 14px 32px;
      background: transparent;
      border: 1px solid var(--cyber-dark);
      color: var(--cyber-light);
      font-family: 'Georgia', serif;
      font-size: 1rem;
      letter-spacing: 1px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .cyber-btn:hover {
      background: rgba(224, 112, 32, 0.1);
      border-color: var(--cyber);
    }

    .cyber-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #cyber-loading {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
      display: none;
    }

    #cyber-loading .spinner {
      border-top-color: var(--cyber);
    }

    #cyber-error {
      text-align: center;
      padding: 24px;
      color: #c07070;
      display: none;
    }

    #cyber-content {
      display: none;
    }

    .cyber-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 32px;
      padding: 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-top: 2px solid var(--cyber-dark);
    }

    .cyber-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 28px 0;
      color: var(--cyber-dark);
      font-size: 0.75rem;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .cyber-divider::before,
    .cyber-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .cyber-verse-card {
      margin-bottom: 28px;
      border: 1px solid var(--border);
      background: var(--bg-card);
    }

    .cyber-verse-card.is-header {
      border-color: var(--cyber-dark);
      background: #140e06;
    }

    .cyber-verse-card .verse-gurmukhi {
      border-bottom-color: var(--border);
    }

    .cyber-verse-card.is-header .verse-gurmukhi {
      color: var(--cyber-light);
    }

    .cyber-verse-card .translation-block.punjabi {
      border-left-color: var(--cyber-dark);
    }

    .cyber-verse-card .translation-block.english {
      border-left-color: #3a4a5a;
    }

    @media (max-width: 600px) {
      .verse-gurmukhi { font-size: 1.25rem; }
      .verse-card.is-header .verse-gurmukhi { font-size: 1.35rem; }
      header h1 { font-size: 1.15rem; }
    }

    /* Listen feature */
    .listen-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .listen-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: var(--bg-elevated);
      border: 1px solid var(--gold-dark);
      color: var(--gold-light);
      font-family: inherit;
      font-size: 0.9rem;
      cursor: pointer;
      letter-spacing: 0.5px;
    }

    .listen-btn:hover { background: #2a2510; border-color: var(--gold); }

    .listen-btn.active { border-color: #c04040; color: #ff8080; }

    .pulse-ring {
      display: none;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #c04040;
      flex-shrink: 0;
      position: relative;
    }

    .pulse-ring::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 2px solid #c04040;
      animation: pulse-anim 1.2s ease-out infinite;
    }

    .listen-btn.active .pulse-ring { display: inline-block; }

    @keyframes pulse-anim {
      0% { transform: scale(0.8); opacity: 1; }
      100% { transform: scale(2.2); opacity: 0; }
    }

    .lang-toggle {
      display: flex;
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .lang-btn {
      padding: 6px 14px;
      background: var(--bg-card);
      border: none;
      color: var(--text-muted);
      font-size: 0.78rem;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.5px;
    }

    .lang-btn.active { background: var(--bg-elevated); color: var(--gold-light); }

    .lang-btn:not(:last-child) { border-right: 1px solid var(--border); }

    .verse-card.matched {
      border-color: var(--gold);
      box-shadow: 0 0 0 1px var(--gold-dark),
                  0 0 24px rgba(201, 168, 76, 0.35),
                  0 0 48px rgba(201, 168, 76, 0.12);
      animation: match-glow 0.5s ease-out;
    }

    @keyframes match-glow {
      from { box-shadow: 0 0 0 rgba(201, 168, 76, 0); }
      to {
        box-shadow: 0 0 0 1px var(--gold-dark),
                    0 0 24px rgba(201, 168, 76, 0.35),
                    0 0 48px rgba(201, 168, 76, 0.12);
      }
    }

    .transcript-overlay {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(13, 13, 13, 0.94);
      border-top: 1px solid var(--gold-dark);
      padding: 10px 20px 14px;
      z-index: 100;
      backdrop-filter: blur(4px);
    }

    .transcript-status {
      font-size: 0.68rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #e06060;
      margin-bottom: 4px;
    }

    .transcript-status.found { color: var(--gold); }

    .transcript-text {
      font-size: 0.88rem;
      color: var(--text-muted);
      font-style: italic;
      min-height: 1.3em;
    }
  </style>
</head>
<body>

<header>
  <div class="header-symbol">ੴ</div>
  <h1>Daily Hukamnama</h1>
  <p class="subtitle">Sri Harmandir Sahib, Amritsar</p>
  <div class="date-badge" id="date-display">Loading...</div>
</header>

<main>
  <div id="loading">
    <div class="spinner"></div>
    <p>Fetching today's Hukamnama...</p>
  </div>
  <div id="error" style="display:none"></div>
  <div id="content" style="display:none"></div>

  <div class="cyber-section">
    <div class="cyber-heading">
      <h2>Cyber Hukamnama</h2>
      <p>Seek personal guidance — a random shabad from Sri Guru Granth Sahib Ji</p>
    </div>
    <button class="cyber-btn" id="cyber-btn" onclick="takeCyberHukamnama()">🙏 Take Your Cyber Hukamnama</button>
    <div id="cyber-loading">
      <div class="spinner"></div>
      <p>Seeking guidance...</p>
    </div>
    <div id="cyber-error"></div>
    <div id="cyber-content"></div>
  </div>
</main>

<footer>
  Hukamnama sourced from <a href="https://www.banidb.com" target="_blank" rel="noopener">BaniDB</a> &mdash;
  Sri Guru Granth Sahib Ji
</footer>

<div class="transcript-overlay" id="transcript-overlay" style="display:none">
  <div class="transcript-status" id="transcript-status">Listening...</div>
  <div class="transcript-text" id="transcript-text"></div>
</div>

<script>
  const verseIndex = [];

  const MONTHS = [
    'January','February','March','April','May','June',
    'July','August','September','October','November','December'
  ];

  async function loadHukamnama() {
    try {
      const res = await fetch('https://api.banidb.com/v2/hukamnamas/today');
      if (!res.ok) throw new Error(`API error: ${res.status}`);
      const data = await res.json();
      render(data);
    } catch (err) {
      showError(err.message);
    }
  }

  function showError(msg) {
    document.getElementById('loading').style.display = 'none';
    const el = document.getElementById('error');
    el.style.display = 'block';
    el.innerHTML = `<p>Could not load Hukamnama.</p><p style="margin-top:8px;font-size:0.85rem">${msg}</p>`;
  }

  function render(data) {
    document.getElementById('loading').style.display = 'none';

    // Date
    const d = data.date && data.date.gregorian;
    if (d) {
      document.getElementById('date-display').textContent =
        `${MONTHS[d.month - 1]} ${d.date}, ${d.year}`;
    } else {
      const now = new Date();
      document.getElementById('date-display').textContent =
        `${MONTHS[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;
    }

    const shabad = data.shabads && data.shabads[0];
    if (!shabad) { showError('No shabad data found.'); return; }

    const info = shabad.shabadInfo;
    const verses = shabad.verses || [];

    const content = document.getElementById('content');
    content.style.display = 'block';
    content.innerHTML = '';

    // Meta bar
    const meta = document.createElement('div');
    meta.className = 'hukamnama-meta';
    meta.innerHTML = `
      <div class="meta-item">
        <div class="meta-label">Source</div>
        <div class="meta-value">${info.source.english}</div>
      </div>
      <div class="meta-item">
        <div class="meta-label">Ang (Page)</div>
        <div class="meta-value">${info.pageNo}</div>
      </div>
      <div class="meta-item">
        <div class="meta-label">Raag</div>
        <div class="meta-value">${info.raag.english}</div>
      </div>
      <div class="meta-item">
        <div class="meta-label">Composer</div>
        <div class="meta-value">${info.writer.english}</div>
      </div>
    `;
    content.appendChild(meta);

    // Section heading
    const divider = document.createElement('div');
    divider.className = 'section-divider';
    divider.textContent = 'Hukamnama';
    content.appendChild(divider);

    // Listen bar
    const listenBar = document.createElement('div');
    listenBar.className = 'listen-bar';
    listenBar.innerHTML = `
      <button class="listen-btn" id="listen-btn">
        <span class="pulse-ring"></span>
        <span class="btn-label">🎙 Listen to Hukamnama</span>
      </button>
      <div class="lang-toggle">
        <button class="lang-btn active" id="lang-en">English</button>
        <button class="lang-btn" id="lang-pa">Punjabi</button>
      </div>
    `;
    content.appendChild(listenBar);

    verseIndex.length = 0;

    // Verses
    verses.forEach((verse, i) => {
      const gurmukhi = verse.verse && verse.verse.unicode;
      if (!gurmukhi) return;

      const transliteration = verse.transliteration && verse.transliteration.english;

      // Punjabi: prefer bdb unicode, fall back to ss unicode, then ms unicode
      const pu = verse.translation && verse.translation.pu;
      let punjabiText = null;
      if (pu) {
        punjabiText = (pu.bdb && pu.bdb.unicode) ||
                      (pu.ss && pu.ss.unicode) ||
                      (pu.ms && pu.ms.unicode) ||
                      (pu.ft && pu.ft.unicode);
      }

      // English: bdb first, then ssk, then ms
      const en = verse.translation && verse.translation.en;
      let englishText = null;
      if (en) {
        englishText = en.bdb || en.ssk || en.ms;
      }

      const card = document.createElement('div');
      card.className = 'verse-card' + (i === 0 ? ' is-header' : '');

      let html = `<div class="verse-gurmukhi">${escHtml(gurmukhi)}</div>`;

      if (transliteration) {
        html += `<div class="verse-transliteration">${escHtml(transliteration)}</div>`;
      }

      const hasTranslations = punjabiText || englishText;
      if (hasTranslations) {
        html += `<div class="verse-translations">`;
        if (punjabiText) {
          html += `
            <div class="translation-block punjabi">
              <div class="translation-lang">Punjabi</div>
              <div class="translation-text gurmukhi">${escHtml(punjabiText)}</div>
            </div>`;
        }
        if (englishText) {
          html += `
            <div class="translation-block english">
              <div class="translation-lang">English</div>
              <div class="translation-text">${escHtml(englishText)}</div>
            </div>`;
        }
        html += `</div>`;
      }

      card.dataset.verseIdx = verseIndex.length;
      verseIndex.push({
        translit: (transliteration || '').toLowerCase(),
        english: (englishText || '').toLowerCase()
      });

      card.innerHTML = html;
      content.appendChild(card);
    });

    ListenFeature.init();
  }

  function escHtml(str) {
    if (!str) return '';
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  async function takeCyberHukamnama() {
    const btn = document.getElementById('cyber-btn');
    const loadingEl = document.getElementById('cyber-loading');
    const errorEl = document.getElementById('cyber-error');
    const contentEl = document.getElementById('cyber-content');

    btn.disabled = true;
    loadingEl.style.display = 'block';
    errorEl.style.display = 'none';
    contentEl.style.display = 'none';
    contentEl.innerHTML = '';

    const angNo = Math.floor(Math.random() * 1430) + 1;

    try {
      const res = await fetch(`https://api.banidb.com/v2/angs/${angNo}/6`);
      if (!res.ok) throw new Error(`API error: ${res.status}`);
      const data = await res.json();
      renderCyber(data, angNo);
    } catch (err) {
      loadingEl.style.display = 'none';
      errorEl.style.display = 'block';
      errorEl.innerHTML = `<p>Could not fetch Cyber Hukamnama.</p><p style="margin-top:8px;font-size:0.85rem">${err.message}</p>`;
    } finally {
      btn.disabled = false;
    }
  }

  function renderCyber(data, angNo) {
    const loadingEl = document.getElementById('cyber-loading');
    const contentEl = document.getElementById('cyber-content');

    loadingEl.style.display = 'none';
    contentEl.style.display = 'block';

    const verses = data.page || [];
    if (!verses.length) {
      document.getElementById('cyber-error').style.display = 'block';
      document.getElementById('cyber-error').innerHTML = '<p>No verses found for this Ang.</p>';
      return;
    }

    const source = (data.source && data.source.english) || 'Sri Guru Granth Sahib Ji';

    const meta = document.createElement('div');
    meta.className = 'cyber-meta';
    meta.innerHTML = `
      <div class="meta-item">
        <div class="meta-label">Source</div>
        <div class="meta-value">${escHtml(source)}</div>
      </div>
      <div class="meta-item">
        <div class="meta-label">Ang (Page)</div>
        <div class="meta-value">${angNo}</div>
      </div>
    `;
    contentEl.appendChild(meta);

    const divider = document.createElement('div');
    divider.className = 'cyber-divider';
    divider.textContent = 'Your Hukamnama';
    contentEl.appendChild(divider);

    verses.forEach((verse, i) => {
      const gurmukhi = verse.verse && verse.verse.unicode;
      if (!gurmukhi) return;

      const transliteration = verse.transliteration && verse.transliteration.english;

      const pu = verse.translation && verse.translation.pu;
      let punjabiText = null;
      if (pu) {
        punjabiText = (pu.bdb && pu.bdb.unicode) ||
                      (pu.ss && pu.ss.unicode) ||
                      (pu.ms && pu.ms.unicode) ||
                      (pu.ft && pu.ft.unicode);
      }

      const en = verse.translation && verse.translation.en;
      let englishText = null;
      if (en) {
        englishText = en.bdb || en.ssk || en.ms;
      }

      const card = document.createElement('div');
      card.className = 'cyber-verse-card' + (i === 0 ? ' is-header' : '');

      let html = `<div class="verse-gurmukhi">${escHtml(gurmukhi)}</div>`;

      if (transliteration) {
        html += `<div class="verse-transliteration">${escHtml(transliteration)}</div>`;
      }

      const hasTranslations = punjabiText || englishText;
      if (hasTranslations) {
        html += `<div class="verse-translations">`;
        if (punjabiText) {
          html += `
            <div class="translation-block punjabi">
              <div class="translation-lang">Punjabi</div>
              <div class="translation-text gurmukhi">${escHtml(punjabiText)}</div>
            </div>`;
        }
        if (englishText) {
          html += `
            <div class="translation-block english">
              <div class="translation-lang">English</div>
              <div class="translation-text">${escHtml(englishText)}</div>
            </div>`;
        }
        html += `</div>`;
      }

      card.innerHTML = html;
      contentEl.appendChild(card);
    });
  }

  const ListenFeature = {
    recognition: null,
    isListening: false,
    currentLang: 'en-GB',
    noMatchTimer: null,
    currentMatchIdx: -1,
    SR: null,

    init() {
      this.SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      const btn = document.getElementById('listen-btn');
      btn.addEventListener('click', () => {
        if (!this.SR) {
          alert('Live listening requires Chrome or a Chromium-based browser.');
          return;
        }
        this.isListening ? this.stop() : this.start();
      });
      document.getElementById('lang-en').addEventListener('click', () => this.setLang('en-GB'));
      document.getElementById('lang-pa').addEventListener('click', () => this.setLang('pa-IN'));
    },

    setLang(lang) {
      this.currentLang = lang;
      document.getElementById('lang-en').classList.toggle('active', lang === 'en-GB');
      document.getElementById('lang-pa').classList.toggle('active', lang === 'pa-IN');
      if (this.isListening) { this.stop(); this.start(); }
    },

    start() {
      const rec = new this.SR();
      rec.continuous = true;
      rec.interimResults = true;
      rec.lang = this.currentLang;
      rec.onresult = (e) => this.handleResult(e);
      rec.onerror = (e) => { if (e.error !== 'no-speech') this.stop(); };
      rec.onend = () => { if (this.isListening) rec.start(); };
      rec.start();
      this.recognition = rec;
      this.isListening = true;
      this.currentMatchIdx = -1;
      this.updateUI(true);
      this.resetNoMatchTimer();
    },

    stop() {
      if (this.recognition) { this.recognition.onend = null; this.recognition.stop(); }
      this.recognition = null;
      this.isListening = false;
      clearTimeout(this.noMatchTimer);
      this.updateUI(false);
    },

    updateUI(listening) {
      const btn = document.getElementById('listen-btn');
      const overlay = document.getElementById('transcript-overlay');
      if (listening) {
        btn.classList.add('active');
        btn.querySelector('.btn-label').textContent = 'Stop Listening';
        overlay.style.display = 'block';
        this.setStatus('Listening...', false);
        document.getElementById('transcript-text').textContent = '';
      } else {
        btn.classList.remove('active');
        btn.querySelector('.btn-label').textContent = '🎙 Listen to Hukamnama';
        overlay.style.display = 'none';
        document.querySelectorAll('.verse-card.matched').forEach(el => el.classList.remove('matched'));
      }
    },

    setStatus(text, found) {
      const el = document.getElementById('transcript-status');
      el.textContent = text;
      el.classList.toggle('found', found);
    },

    handleResult(e) {
      let interim = '';
      let final = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) final += t + ' ';
        else interim += t;
      }
      const display = (final + interim).trim();
      document.getElementById('transcript-text').textContent = display || '...';

      const searchText = (final || interim).trim().toLowerCase();
      if (!searchText) return;

      this.resetNoMatchTimer();

      let bestScore = 0, bestIdx = -1;
      verseIndex.forEach((v, i) => {
        const score = this.scoreMatch(searchText, v);
        if (score > bestScore) { bestScore = score; bestIdx = i; }
      });

      if (bestScore >= 0.25 && bestIdx !== this.currentMatchIdx) {
        this.currentMatchIdx = bestIdx;
        this.highlightVerse(bestIdx);
        this.setStatus('Match found', true);
      }
    },

    scoreMatch(query, verse) {
      const words = query.split(/\s+/).filter(w => w.length > 2);
      if (!words.length) return 0;
      const target = verse.translit + ' ' + verse.english;
      return words.filter(w => target.includes(w)).length / words.length;
    },

    highlightVerse(idx) {
      document.querySelectorAll('.verse-card.matched').forEach(el => el.classList.remove('matched'));
      const card = document.querySelector(`.verse-card[data-verse-idx="${idx}"]`);
      if (!card) return;
      card.classList.add('matched');
      card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    },

    resetNoMatchTimer() {
      clearTimeout(this.noMatchTimer);
      this.noMatchTimer = setTimeout(() => {
        if (this.isListening && this.currentMatchIdx === -1) {
          this.setStatus('No match found — try speaking more clearly', false);
        }
      }, 5000);
    }
  };

  loadHukamnama();
</script>
